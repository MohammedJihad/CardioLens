<svg viewBox="0 0 200 74" xmlns="http://www.w3.org/2000/svg"><rect x="-5" y="-5" width="220" height="320" fill="#FAFAF7"/><defs><marker id="ah" markerWidth="6" markerHeight="6" refX="4.6" refY="2.5" orient="auto"><path d="M0,0 L5,2.5 L0,5 Z" fill="#1E2A44"/></marker></defs><rect x="4" y="2" width="192" height="12.5" rx="2.4" fill="#1E2A44"/><text x="9" y="7.4" font-family="Hanken Grotesk, system-ui, Arial, sans-serif" font-weight="700" font-size="3.7" fill="#FFFFFF">Frozen science</text><text x="9" y="11.8" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="2.6" fill="#FFFFFF" opacity="0.82">src · models · reports · data · tests — never modified</text><rect x="8" y="16.5" width="184" height="12.5" rx="2.4" fill="#27506B"/><text x="13" y="21.9" font-family="Hanken Grotesk, system-ui, Arial, sans-serif" font-weight="700" font-size="3.7" fill="#FFFFFF">Additive-only backend</text><text x="13" y="26.3" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="2.6" fill="#FFFFFF" opacity="0.82">new API fields only; no metric ever changes</text><rect x="12" y="31.0" width="176" height="12.5" rx="2.4" fill="#2F8F83"/><text x="17" y="36.4" font-family="Hanken Grotesk, system-ui, Arial, sans-serif" font-weight="700" font-size="3.7" fill="#FFFFFF">Safe wording</text><text x="17" y="40.8" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="2.6" fill="#FFFFFF" opacity="0.82">build-time scan blocks banned terms</text><rect x="16" y="45.5" width="168" height="12.5" rx="2.4" fill="#C98A3B"/><text x="21" y="50.9" font-family="Hanken Grotesk, system-ui, Arial, sans-serif" font-weight="700" font-size="3.7" fill="#FFFFFF">No storage</text><text x="21" y="55.3" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="2.6" fill="#FFFFFF" opacity="0.82">no DB · no auth · no analytics of inputs</text><rect x="20" y="60.0" width="160" height="12.5" rx="2.4" fill="#C2614E"/><text x="25" y="65.4" font-family="Hanken Grotesk, system-ui, Arial, sans-serif" font-weight="700" font-size="3.7" fill="#FFFFFF">Human in the loop</text><text x="25" y="69.8" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="2.6" fill="#FFFFFF" opacity="0.82">owner deploys & reviews each phase</text></svg>